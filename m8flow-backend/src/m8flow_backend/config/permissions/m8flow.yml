# This is M8Flow permissions configuration file. It defines users, groups and permissions for the M8FLow backend.
# The permissions defined here are used to control access to different parts of the frontend and backend API.
# The users and groups defined here should be managed in an OIDC provider, and mapped to these names.
# The permissions are defined with a name, a list of groups that have the permission, a list of actions that are allowed, and a URI pattern that defines the scope of the permission.
# The URI patterns can include macros like PG:ALL or PM:ALL, which are expanded to all process groups or process models respectively.
# The groups and permissions defined here are appended to the tables in the database on login, so changes to this file will take effect on the next login of each user.
# If a permission needs to be removed, it should be done in the database directly.


# Users should be created in OIDC provider.
users:

# Groups should be managed in OIDC provider or user management system and mapped to these names.
groups:
  # The "super-admin" group has platform-wide access, including tenant management and cross-tenant operations.
  "super-admin":
    users: []
  # The "tenant-admin" group has access to everything within a tenant, including tenant-local
  # member/group management and tenant display-name updates, but it cannot manage other tenants.
  "tenant-admin":
    users: []
  # The "editor" group has access to most features in the frontend and backend, but does not have access to tenant management or some sensitive features like secrets management. 
  "editor":
    users: []
  # The "viewer" group has read-only access to most features in the frontend and backend, but does not have access to tenant management or any features that allow modifying data.
  "viewer":
    users: []
  # The "integrator" group has access to features that are relevant for integrating M8Flow with other systems, such as managing authentications and secrets, 
  # but does not have access to tenant management or most frontend features.
  "integrator":
    users: []
  # The "reviewer" group has access to task review features only.
  # It can work assigned tasks, but does not have access to process or process-instance pages.
  "reviewer":
    users: []
  # The "submitter" group can start processes and submit assigned tasks/forms, but cannot access admin or configuration features.
  "submitter":
    users: []
  # The "everybody" group is a special group that includes all users, and is used to assign permissions that should be available to everyone.
  
# Permissions defined here are appended to the permissions in the database on login, so changes to this file will take effect on the next login of each user.
permissions:
  # Very basic permissions for general access to the frontend and onboarding, assigned to everybody.
  frontend-access:
    groups: ["everybody"]
    actions: [read]
    uri: /frontend-access
  onboarding:
    groups: ["everybody"]
    actions: [read]
    uri: /onboarding
  active-users:
    groups: ["everybody"]
    actions: [create]
    uri: /active-users/*
  read-extensions:
    groups: ["everybody"]
    actions: [read]
    uri: /extensions
  read-current-user-groups:
    groups: ["everybody"]
    actions: [read]
    uri: /user-groups/for-current-user
  read-user-existence:
    groups: ["everybody"]
    actions: [create]
    uri: /users/exists/by-username
  read-version-info:
    groups: ["everybody"]
    actions: [read]
    uri: /debug/version-info
  read-onboarding-locations:
    groups: ["everybody"]
    actions: [read]
    uri: /upsearch-locations
  read-connector-typeahead:
    groups: ["everybody"]
    actions: [read]
    uri: /connector-proxy/typeahead/*
  read-script-assist-enabled:
    groups: ["everybody"]
    actions: [read]
    uri: /script-assist/enabled


  # Super Admins are global operators (master realm) and can manage all tenant resources.
  super-admin-frontend-access:
    groups: ["super-admin"]
    actions: [read]
    uri: /frontend-access
  super-admin:
    groups: ["super-admin"]
    actions: [all]
    uri: /m8flow/tenants*
  tenant-admin-tenant-management-page:
    groups: ["tenant-admin"]
    actions: [read]
    uri: /m8flow/tenant-management
  read-current-user-organization-memberships:
    groups: ["everybody"]
    actions: [read]
    uri: /m8flow/organization-memberships
  tenant-admin-update-own-tenant-resources:
    groups: ["tenant-admin"]
    actions: [update]
    uri: /m8flow/tenants/*
  manage-tenant-realms:
    groups: ["super-admin"]
    actions: [all]
    uri: /m8flow/tenant-realms*
  read-all-process-groups:
    groups: ["viewer", "super-admin","submitter"]
    actions: [read]
    uri: PG:ALL
  manage-all-process-groups:
    groups: ["tenant-admin", "editor"]
    actions: [all]
    uri: PG:ALL
  read-process-group-list:
    groups: ["tenant-admin", "editor", "viewer"]
    actions: [read]
    uri: /process-groups
  read-all-process-models:
    groups: ["viewer", "reviewer", "super-admin", "submitter"]
    actions: [read]
    uri: PM:ALL
  manage-all-process-models:
    groups: ["tenant-admin", "editor"]
    actions: [all]
    uri: PM:ALL
  read-process-model-list:
    groups: ["tenant-admin", "editor", "viewer"]
    actions: [read]
    uri: /process-models
  read-process-list:
    groups: ["tenant-admin", "editor", "viewer"]
    actions: [read]
    uri: /processes
  read-processes:
    groups: ["tenant-admin", "editor", "viewer", "reviewer", "super-admin", "submitter"]
    actions: [read]
    uri: /processes/*
  run-all-process-models:
    groups: ["tenant-admin", "editor","submitter"]
    actions: [start]
    uri: PM:ALL
  read-process-instance-list:
    groups: ["tenant-admin", "editor", "viewer"]
    actions: [read]
    uri: /process-instances
  create-process-instance-list-for-me:
    groups: ["tenant-admin", "editor"]
    actions: [create]
    uri: /process-instances/for-me
  read-process-instance-report-metadata:
    groups: ["tenant-admin", "editor", "viewer"]
    actions: [read]
    uri: /process-instances/report-metadata
  read-process-instances:
    groups: ["tenant-admin", "editor", "viewer", "super-admin","submitter"]
    actions: [read]
    uri: /process-instances/*
  read-user-search:
    groups: ["tenant-admin", "editor", "viewer", "reviewer", "integrator"]
    actions: [read]
    uri: /users/search
  super-admin-process-instances-for-me-list:
    groups: ["super-admin"]
    actions: [create]
    uri: /process-instances/for-me
  super-admin-process-instances-list:
    groups: ["super-admin"]
    actions: [create]
    uri: /process-instances
  read-user-groups-items:
    groups: ["tenant-admin", "editor", "viewer", "super-admin","submitter"]
    actions: [read]
    uri: /user-groups/*
  read-service-task-list:
    groups: ["tenant-admin", "editor", "viewer"]
    actions: [read]
    uri: /service-tasks
  read-script-assist-items:
    groups: ["tenant-admin", "editor", "viewer", "reviewer", "super-admin","submitter"]
    actions: [read]
    uri: /script-assist/*
  read-service-tasks:
    groups: ["tenant-admin", "editor", "viewer", "super-admin","submitter", "integrator"]
    actions: [read]
    uri: /service-tasks/*
  read-service-tasks-root:
    groups: ["tenant-admin", "editor", "viewer", "reviewer", "submitter", "integrator"]
    actions: [read]
    uri: /service-tasks
  read-connectors-grouped:
    groups: ["tenant-admin", "editor", "integrator", "super-admin"]
    actions: [read]
    uri: /m8flow/connectors-grouped
  read-data-stores:
    groups: ["viewer", "super-admin"]
    actions: [read]
    uri: /data-stores/*
  read-data-stores-types:
    groups: ["viewer", "super-admin"]
    actions: [read]
    uri: /data-stores/types/
  manage-data-stores:
    groups: ["tenant-admin", "editor"]
    actions: [all]
    uri: /data-stores/*
  read-data-store-list:
    groups: ["tenant-admin", "editor"]
    actions: [read]
    uri: /data-stores
  manage-data-stores-types:
    groups: ["tenant-admin", "editor"]
    actions: [all]
    uri: /data-stores/types/
  read-messages:
    groups: ["viewer", "super-admin"]
    actions: [read]
    uri: /messages/*
  manage-messages:
    groups: ["tenant-admin", "editor"]
    actions: [all]
    uri: /messages/*
  read-message-list:
    groups: ["tenant-admin", "editor"]
    actions: [read]
    uri: /messages
  read-secrets:
    groups: ["integrator", "viewer", "super-admin"]
    actions: [read]
    uri: /secrets
  read-secret-items:
    groups: ["integrator", "viewer", "super-admin"]
    actions: [read]
    uri: /secrets/*
  manage-secrets:
    groups: ["tenant-admin", "integrator"]
    actions: [all]
    uri: /secrets
  manage-secret-items:
    groups: ["tenant-admin", "integrator"]
    actions: [all]
    uri: /secrets/*
  # authentication (singular)
  read-authentication-items:
    groups: ["integrator", "viewer", "super-admin"]
    actions: [read]
    uri: /authentication/*
  manage-authentication-items:
    groups: ["tenant-admin", "integrator"]
    actions: [all]
    uri: /authentication/*
  # authentications (plural)
  read-authentications:
    groups: ["integrator", "viewer", "super-admin"]
    actions: [read]
    uri: /authentications
  read-authentications-items:
    groups: ["integrator", "viewer", "super-admin"]
    actions: [read]
    uri: /authentications/*
  manage-authentications:
    groups: ["tenant-admin", "integrator"]
    actions: [all]
    uri: /authentications
  manage-authentications-items:
    groups: ["tenant-admin", "integrator"]
    actions: [all]
    uri: /authentications/*
  manage-templates:
    groups: ["tenant-admin", "editor"]
    actions: [all]
    uri: /m8flow/templates
  manage-template-items:
    groups: ["tenant-admin", "editor"]
    actions: [all]
    uri: /m8flow/templates/*
  read-templates:
    groups: ["viewer", "super-admin"]
    actions: [read]
    uri: /m8flow/templates
  viewer-template-items:
    groups: ["viewer", "super-admin"]
    actions: [read]
    uri: /m8flow/templates/*
  # Admin-only template operations (delete published, restore soft-deleted).
  # Editors can manage templates but only tenant-admin can perform these privileged operations.
  admin-templates:
    groups: ["tenant-admin"]
    actions: [all]
    uri: /m8flow/admin/templates
  read-template-process-model-template-info:
    groups: ["tenant-admin", "editor", "viewer", "reviewer", "submitter"]
    actions: [read]
    uri: /m8flow/templates/process-models/*
  manage-tasks:
    groups: ["tenant-admin", "editor", "reviewer","submitter"]
    actions: [all]
    uri: /tasks/*
  read-task-list:
    groups: ["tenant-admin", "editor", "viewer", "reviewer"]
    actions: [read]
    uri: /tasks
  read-tasks:
    groups: ["viewer", "super-admin"]
    actions: [read]
    uri: /tasks/*
  read-nats-tokens:
    groups: ["integrator", "viewer", "super-admin"]
    actions: [read]
    uri: /m8flow/nats-tokens
  manage-nats-tokens:
    groups: ["tenant-admin", "integrator"]
    actions: [all]
    uri: /m8flow/nats-tokens
