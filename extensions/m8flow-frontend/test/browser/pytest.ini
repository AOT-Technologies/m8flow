[pytest]
pythonpath = .
# Reruns off: one attempt per test; rely on timeouts and explicit waits (see PAGE_DATA_TIMEOUT / ELEMENT_TIMEOUT).
# To temporarily re-enable flaky retries: ``pytest --reruns=2``.
addopts = --timeout=120 --reruns=0 --screenshot=only-on-failure --tracing=retain-on-failure --output=test-results
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file = test-results/pytest-session.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
