name: Migration Compatibility Check

on:
  workflow_call:
    inputs:
      migrations_changed:
        description: "Whether migration files were modified"
        required: true
        type: boolean
      require_pr_metadata:
        description: "Whether PR-description migration-plan checks should run"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

jobs:
  migration-check:
    name: Validate Migration Compatibility
    runs-on: ubuntu-latest

    steps:
      - name: No migration files changed
        if: ${{ inputs.migrations_changed != true }}
        run: |
          echo "No migration files changed; skipping detailed migration validation."
          echo "## Migration Compatibility Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No migration files changed for this run." >> $GITHUB_STEP_SUMMARY

      - name: Checkout repository
        if: ${{ inputs.migrations_changed == true }}
        uses: actions/checkout@v4

      - name: Install jq (required by fetch-upstream)
        if: ${{ inputs.migrations_changed == true }}
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch upstream folders (for migrations inspection)
        if: ${{ inputs.migrations_changed == true }}
        run: ./bin/fetch-upstream.sh

      # -------------------------
      # PR Description Validation
      # -------------------------
      - name: Validate Migration Plan section exists
        if: ${{ inputs.migrations_changed == true && inputs.require_pr_metadata == true }}
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "$PR_BODY" ]]; then
            echo "::error::PR description is empty. Migration Plan required."
            exit 1
          fi

          echo "$PR_BODY" | grep -qi "Migration Plan" || {
            echo "::error::Missing 'Migration Plan' section in PR description"
            exit 1
          }

      - name: Validate required migration plan content
        if: ${{ inputs.migrations_changed == true && inputs.require_pr_metadata == true }}
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          REQUIRED_SECTIONS=(
            "Backward Compatibility"
            "Rollback"
            "Expand/Contract"
          )

          for section in "${REQUIRED_SECTIONS[@]}"; do
            echo "$PR_BODY" | grep -qi "$section" || {
              echo "::error::Migration Plan missing required section: $section"
              exit 1
            }
          done

      # -------------------------
      # Migration File Inspection
      # -------------------------
      - name: Detect destructive migration patterns
        if: ${{ inputs.migrations_changed == true }}
        run: |
          echo "Scanning migrations for destructive operations..."

          MIGRATION_DIRS=()
          if [ -d "m8flow-backend/migrations/versions" ]; then
            MIGRATION_DIRS+=("m8flow-backend/migrations/versions")
          fi
          if [ -d "spiffworkflow-backend/migrations/versions" ]; then
            MIGRATION_DIRS+=("spiffworkflow-backend/migrations/versions")
          fi

          if [ ${#MIGRATION_DIRS[@]} -eq 0 ]; then
            echo "::warning::No migration directories found"
            exit 0
          fi

          MATCHES=$(find "${MIGRATION_DIRS[@]}" -type f -name "*.py" -exec grep -lE "op\.drop_|DROP TABLE|DROP COLUMN|ALTER TABLE .* DROP" {} \; || true)

          if [[ -n "$MATCHES" ]]; then
            echo "::warning::Potential destructive migration detected in:"
            echo "$MATCHES"

            if [[ "${{ inputs.require_pr_metadata }}" == "true" ]]; then
              echo "${{ github.event.pull_request.body }}" | grep -qi "Destructive Migration Approved" || {
                echo "::error::Destructive migration detected without explicit approval."
                echo "Add 'Destructive Migration Approved' to the Migration Plan."
                exit 1
              }
            else
              echo "::warning::Potential destructive migration detected on push. PR approval text check skipped outside PR context."
            fi
          fi

      # -------------------------
      # Optional: Alembic Sanity Check
      # -------------------------
      - name: Validate Alembic revision files load
        if: ${{ inputs.migrations_changed == true }}
        run: |
          python - <<'EOF'
          import pathlib, sys

          paths = [
              pathlib.Path("m8flow-backend/migrations/versions"),
              pathlib.Path("spiffworkflow-backend/migrations/versions"),
          ]
          existing_paths = [path for path in paths if path.exists()]
          if not existing_paths:
              print("No migration directories found; skipping compile check.")
              raise SystemExit(0)
          bad = False

          for path in existing_paths:
              for file in path.glob("*.py"):
                  try:
                      compile(file.read_text(), file.name, "exec")
                  except Exception as e:
                      print(f"Invalid migration file: {file}: {e}")
                      bad = True

          if bad:
              sys.exit(1)
          EOF

      - name: Migration compatibility check passed
        if: ${{ inputs.migrations_changed == true }}
        run: |
          echo "Migration checks passed"

          echo "## Migration Compatibility Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.require_pr_metadata }}" == "true" ]]; then
            echo "All required sections found in PR description:" >> $GITHUB_STEP_SUMMARY
            echo "- Migration Plan" >> $GITHUB_STEP_SUMMARY
            echo "- Backward Compatibility" >> $GITHUB_STEP_SUMMARY
            echo "- Rollback strategy" >> $GITHUB_STEP_SUMMARY
            echo "- Expand/Contract classification" >> $GITHUB_STEP_SUMMARY
          else
            echo "PR-specific migration-plan validation was skipped for this push run." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Migration files validated successfully." >> $GITHUB_STEP_SUMMARY
