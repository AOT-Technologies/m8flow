name: CI

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Default: safe for fork PRs
permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      docker_m8flow: ${{ steps.filter.outputs.docker_m8flow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'm8flow-backend/**'
            frontend:
              - 'm8flow-frontend/**'
              - 'extensions/m8flow-frontend/**'
              - 'm8flow-backend/**'
              - 'docker/**'
            migrations:
              - 'spiffworkflow-backend/migrations/versions/*.py'
            docker_m8flow:
              - 'docker/**'
              - 'm8flow-connector-proxy/**'

  # -------------------------
  # Backend CI
  # -------------------------
  backend:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq (required by fetch-upstream)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Fetch upstream folders
        run: ./bin/fetch-upstream.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        working-directory: spiffworkflow-backend
        run: uv sync --group dev
      - name: Test M8Flow backend
        working-directory: spiffworkflow-backend
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/src:$(pwd)/../m8flow-backend/src
          uv run pytest ../m8flow-backend/tests

  # -------------------------
  # Frontend CI
  # -------------------------
  frontend:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq (required by fetch-upstream)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Fetch upstream folders
        run: ./bin/fetch-upstream.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: m8flow-frontend/package-lock.json
      - name: Install M8Flow frontend dependencies
        working-directory: m8flow-frontend
        run: npm ci
      - name: Typecheck M8Flow frontend
        working-directory: m8flow-frontend
        run: npm run typecheck
      - name: Test M8Flow frontend
        working-directory: m8flow-frontend
        run: npm test
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
      - name: Install uv
        run: pip install uv
      - name: Install browser test dependencies
        working-directory: extensions/m8flow-frontend/test/browser
        run: uv sync --locked
      - name: Install Playwright Chromium
        working-directory: extensions/m8flow-frontend/test/browser
        run: uv run playwright install --with-deps chromium
      - name: Start m8flow stack for browser tests
        run: |
          docker compose -f docker/m8flow-docker-compose.yml up -d --build \
            keycloak-db m8flow-db redis minio keycloak keycloak-proxy \
            keycloak-master-admin-init m8flow-connector-proxy \
            m8flow-backend m8flow-celery-worker m8flow-frontend
      - name: Wait for backend and frontend
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:6840/v1.0/status > /dev/null; then
              break
            fi
            sleep 5
          done
          curl -fsS http://localhost:6840/v1.0/status > /dev/null

          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:6841/ > /dev/null; then
              break
            fi
            sleep 5
          done
          curl -fsS http://localhost:6841/ > /dev/null
      - name: Run browser tests
        working-directory: extensions/m8flow-frontend/test/browser
        run: uv run python -m pytest -v
      - name: Upload browser test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-results
          path: extensions/m8flow-frontend/test/browser/test-results
          if-no-files-found: ignore
      - name: Dump stack logs on failure
        if: ${{ failure() }}
        run: docker compose -f docker/m8flow-docker-compose.yml logs --no-color
      - name: Stop m8flow stack
        if: ${{ always() }}
        run: docker compose -f docker/m8flow-docker-compose.yml down -v

  # -------------------------
  # Security: CodeQL
  # -------------------------
  codeql:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    strategy:
      matrix:
        language: [ 'python', 'javascript' ]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # -------------------------
  # Security: Trivy (filesystem scan)
  # -------------------------
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          skip-files: spiffworkflow-backend/src/spiffworkflow_backend/config/openid/rsa_keys.py

  # -------------------------
  # Migration Compatibility Check
  # -------------------------
  migration-check:
    name: Migration Compatibility Check
    needs: changes
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    uses: ./.github/workflows/check-migrations.yml
    with:
      migrations_changed: ${{ github.event_name == 'push' || needs.changes.outputs.migrations == 'true' }}
      require_pr_metadata: ${{ github.event_name == 'pull_request' }}

  # -------------------------
  # Optional Docker Build Dry Run
  # -------------------------
  docker-dry-run:
    name: Docker Build Dry Run
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker_m8flow == 'true') && github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard against floating connector refs
        run: |
          if grep -E 'branch\s*=\s*"(main|master|develop)"' m8flow-connector-proxy/pyproject.toml; then
            echo "::error::Connector dependencies must pin a tag or rev, not a branch."
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.1"
      - name: Validate connector-proxy lock file
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==2.2.1
          cd m8flow-connector-proxy
          poetry check --lock
      - uses: docker/setup-buildx-action@v3
      - name: Backend image build (no push)
        run: |
          docker buildx build \
            --file docker/m8flow.backend.Dockerfile \
            --tag backend:pr-test \
            --load \
            .
      - name: Frontend image build (no push)
        run: |
          docker buildx build \
            --file docker/m8flow.frontend.Dockerfile \
            --tag frontend:pr-test \
            --load \
            .
      - name: Keycloak image build (no push)
        run: |
          docker buildx build \
            --file docker/m8flow.keycloak.Dockerfile \
            --tag keycloak:pr-test \
            --load \
            .
      - name: Connector-proxy image build (no push)
        run: |
          docker buildx build \
            --file m8flow-connector-proxy/Dockerfile \
            --tag connector-proxy:pr-test \
            --load \
            m8flow-connector-proxy
