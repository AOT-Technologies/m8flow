name: CI

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Default: safe for fork PRs
permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  path_filters:
    name: Path Filters
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      docker_m8flow: ${{ steps.filter.outputs.docker_m8flow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'm8flow-backend/**'
            frontend:
              - 'm8flow-frontend/**'
            migrations:
              - 'm8flow-backend/migrations/versions/*.py'
              - 'spiffworkflow-backend/migrations/versions/*.py'
            docker_m8flow:
              - 'docker/**'
              - 'm8flow-connector-proxy/**'

  # -------------------------
  # Backend Lint
  # -------------------------
  backend-lint:
    name: Backend Lint
    needs: path_filters
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
      - name: Install Ruff
        run: python -m pip install ruff==0.12.1
      - name: Run M8Flow backend lint
        working-directory: m8flow-backend
        run: python -m ruff check . --config ruff.toml

  # -------------------------
  # Backend CI
  # -------------------------
  backend:
    name: Backend Unit Tests
    needs: path_filters
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq (required by fetch-upstream)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Fetch upstream folders
        run: ./bin/fetch-upstream.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        working-directory: spiffworkflow-backend
        run: uv sync --group dev
      - name: Test M8Flow backend
        working-directory: spiffworkflow-backend
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/src:$(pwd)/../m8flow-backend/src
          uv run pytest ../m8flow-backend/tests

  # -------------------------
  # Frontend Lint
  # -------------------------
  frontend-lint:
    name: Frontend Lint
    needs: path_filters
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: m8flow-frontend/package-lock.json
      - name: Install M8Flow frontend dependencies
        working-directory: m8flow-frontend
        run: npm ci
      - name: Run M8Flow frontend lint
        working-directory: m8flow-frontend
        run: npm run lint

  # -------------------------
  # Frontend Build + Unit
  # -------------------------
  frontend-build-unit:
    name: Frontend Build and Unit
    needs: path_filters
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq (required by fetch-upstream)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Fetch upstream folders
        run: ./bin/fetch-upstream.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: m8flow-frontend/package-lock.json
      - name: Install M8Flow frontend dependencies
        working-directory: m8flow-frontend
        run: npm ci
      - name: Build M8Flow frontend bundle
        working-directory: m8flow-frontend
        run: npm run build
      - name: Run M8Flow frontend unit tests
        working-directory: m8flow-frontend
        run: npm test

  # -------------------------
  # Security: CodeQL
  # -------------------------
  codeql:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    strategy:
      matrix:
        language: [ 'python', 'javascript' ]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # -------------------------
  # Security: Trivy (filesystem scan)
  # -------------------------
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          skip-files: spiffworkflow-backend/src/spiffworkflow_backend/config/openid/rsa_keys.py

  # -------------------------
  # Migration Compatibility Check
  # -------------------------
  migration-check:
    name: Migration Compatibility Check
    needs: path_filters
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    uses: ./.github/workflows/check-migrations.yml
    with:
      migrations_changed: ${{ github.event_name == 'push' || needs.path_filters.outputs.migrations == 'true' }}
      require_pr_metadata: ${{ github.event_name == 'pull_request' }}

  # -------------------------
  # Optional Docker Build Dry Run
  # -------------------------
  docker-dry-run:
    name: Docker Build Dry Run
    needs: path_filters
    runs-on: ubuntu-latest
    if: ${{ (needs.path_filters.outputs.backend == 'true' || needs.path_filters.outputs.frontend == 'true' || needs.path_filters.outputs.docker_m8flow == 'true') && github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard against floating connector refs
        run: |
          if grep -E 'branch\s*=\s*"(main|master|develop)"' m8flow-connector-proxy/pyproject.toml; then
            echo "::error::Connector dependencies must pin a tag or rev, not a branch."
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.1"
      - name: Validate connector-proxy lock file
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==2.2.1
          cd m8flow-connector-proxy
          poetry check --lock
      - uses: docker/setup-buildx-action@v3
      - name: Backend image build (no push)
        run: |
          docker buildx build \
            --file docker/m8flow.backend.Dockerfile \
            --tag backend:pr-test \
            --load \
            .
      - name: Frontend image build (no push)
        run: |
          docker buildx build \
            --file docker/m8flow.frontend.Dockerfile \
            --tag frontend:pr-test \
            --load \
            .
      - name: Keycloak image build (no push)
        run: |
          docker buildx build \
            --file docker/m8flow.keycloak.Dockerfile \
            --tag keycloak:pr-test \
            --load \
            .
      - name: Connector-proxy image build (no push)
        run: |
          docker buildx build \
            --file m8flow-connector-proxy/Dockerfile \
            --tag connector-proxy:pr-test \
            --load \
            m8flow-connector-proxy

  # -------------------------
  # Required Merge Gate
  # -------------------------
  required-ci:
    name: Required CI
    needs:
      - path_filters
      - backend-lint
      - backend
      - frontend-lint
      - frontend-build-unit
      - codeql
      - trivy
      - migration-check
      - docker-dry-run
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'pull_request') }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate required CI results
        shell: bash
        run: |
          set -euo pipefail

          echo "backend result: ${{ needs.backend.result }}"
          echo "backend-lint result: ${{ needs.backend-lint.result }}"
          echo "frontend-lint result: ${{ needs.frontend-lint.result }}"
          echo "frontend-build-unit result: ${{ needs.frontend-build-unit.result }}"
          echo "codeql result: ${{ needs.codeql.result }}"
          echo "trivy result: ${{ needs.trivy.result }}"
          echo "migration-check result: ${{ needs.migration-check.result }}"
          echo "docker-dry-run result: ${{ needs.docker-dry-run.result }}"

          if [[ "${{ github.event_name }}" == "push" || "${{ needs.path_filters.outputs.backend }}" == "true" ]]; then
            [[ "${{ needs.backend-lint.result }}" == "success" ]] || {
              echo "::error::Backend lint CI did not succeed."
              exit 1
            }
            [[ "${{ needs.backend.result }}" == "success" ]] || {
              echo "::error::Backend CI did not succeed."
              exit 1
            }
          fi

          if [[ "${{ github.event_name }}" == "push" || "${{ needs.path_filters.outputs.frontend }}" == "true" ]]; then
            [[ "${{ needs.frontend-lint.result }}" == "success" ]] || {
              echo "::error::Frontend lint CI did not succeed."
              exit 1
            }
            [[ "${{ needs.frontend-build-unit.result }}" == "success" ]] || {
              echo "::error::Frontend build/unit CI did not succeed."
              exit 1
            }
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            [[ "${{ needs.codeql.result }}" == "success" ]] || {
              echo "::error::CodeQL scan did not succeed."
              exit 1
            }
            [[ "${{ needs.trivy.result }}" == "success" ]] || {
              echo "::error::Trivy security scan did not succeed."
              exit 1
            }
          fi

          [[ "${{ needs.migration-check.result }}" == "success" ]] || {
            echo "::error::Migration compatibility check did not succeed."
            exit 1
          }

          if [[ "${{ github.event_name }}" == "pull_request" && ( "${{ needs.path_filters.outputs.backend }}" == "true" || "${{ needs.path_filters.outputs.frontend }}" == "true" || "${{ needs.path_filters.outputs.docker_m8flow }}" == "true" ) ]]; then
            [[ "${{ needs.docker-dry-run.result }}" == "success" ]] || {
              echo "::error::Docker build dry run did not succeed."
              exit 1
            }
          fi
