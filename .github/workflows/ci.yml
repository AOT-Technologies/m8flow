name: CI

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Default: safe for fork PRs
permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  path_filters:
    name: Path Filters
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      docker_m8flow: ${{ steps.filter.outputs.docker_m8flow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'm8flow-backend/**'
            frontend:
              - 'm8flow-frontend/**'
            migrations:
              - 'm8flow-backend/migrations/versions/*.py'
              - 'spiffworkflow-backend/migrations/versions/*.py'
            docker_m8flow:
              - 'docker/**'
              - 'm8flow-connector-proxy/**'

  # -------------------------
  # Backend Lint
  # -------------------------
  backend-lint:
    name: Backend Lint
    needs: path_filters
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
      - name: Install Ruff
        run: python -m pip install ruff==0.12.1
      - name: Run M8Flow backend lint
        working-directory: m8flow-backend
        run: python -m ruff check . --config ruff.toml

  # -------------------------
  # Backend CI
  # -------------------------
  backend:
    name: Backend Unit Tests
    needs: path_filters
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq (required by fetch-upstream)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Fetch upstream folders
        run: ./bin/fetch-upstream.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        working-directory: spiffworkflow-backend
        run: uv sync --group dev
      - name: Test M8Flow backend
        working-directory: spiffworkflow-backend
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/src:$(pwd)/../m8flow-backend/src
          uv run pytest ../m8flow-backend/tests

  # -------------------------
  # Frontend Lint
  # -------------------------
  frontend-lint:
    name: Frontend Lint
    needs: path_filters
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: m8flow-frontend/package-lock.json
      - name: Install M8Flow frontend dependencies
        working-directory: m8flow-frontend
        run: npm ci
      - name: Run M8Flow frontend lint
        working-directory: m8flow-frontend
        run: npm run lint

  # -------------------------
  # Frontend Build + Unit
  # -------------------------
  frontend-build-unit:
    name: Frontend Build and Unit
    needs: path_filters
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq (required by fetch-upstream)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Fetch upstream folders
        run: ./bin/fetch-upstream.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: m8flow-frontend/package-lock.json
      - name: Install M8Flow frontend dependencies
        working-directory: m8flow-frontend
        run: npm ci
      - name: Build M8Flow frontend bundle
        working-directory: m8flow-frontend
        run: npm run build
      - name: Run M8Flow frontend unit tests
        working-directory: m8flow-frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test:ci

  # -------------------------
  # Security: CodeQL
  # -------------------------
  codeql:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    strategy:
      matrix:
        language: [ 'python', 'javascript' ]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # -------------------------
  # Security: Trivy (filesystem scan)
  # -------------------------
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          skip-files: spiffworkflow-backend/src/spiffworkflow_backend/config/openid/rsa_keys.py

  # -------------------------
  # Migration Compatibility Check
  # -------------------------
  migration-check:
    name: Migration Compatibility Check
    needs: path_filters
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    uses: ./.github/workflows/check-migrations.yml
    with:
      migrations_changed: ${{ github.event_name == 'push' || needs.path_filters.outputs.migrations == 'true' }}

  # -------------------------
  # Optional Docker Build Dry Run
  # -------------------------
  docker-dry-run:
    name: Docker Build Dry Run
    needs: path_filters
    runs-on: ubuntu-latest
    if: ${{ (needs.path_filters.outputs.backend == 'true' || needs.path_filters.outputs.frontend == 'true' || needs.path_filters.outputs.docker_m8flow == 'true') && github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard against floating connector refs
        run: |
          if grep -E 'branch\s*=\s*"(main|master|develop)"' m8flow-connector-proxy/pyproject.toml; then
            echo "::error::Connector dependencies must pin a tag or rev, not a branch."
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.1"
      - name: Validate connector-proxy lock file
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==2.2.1
          cd m8flow-connector-proxy
          poetry check --lock
      - uses: docker/setup-buildx-action@v3
      - name: Backend image build (no push)
        # GitHub Actions layer cache (per-image scope, no creds, fork-PR safe) plus a
        # read-only registry cache seed from production builds. The backend pulls the
        # shared base via the PYTHON_BASE arg default in the Dockerfile.
        run: |
          docker buildx build \
            --file docker/m8flow.backend.Dockerfile \
            --tag backend:pr-test \
            --cache-from type=registry,ref=docker.io/m8flow/m8flow-backend:buildcache \
            --cache-from type=gha,scope=backend \
            --cache-to type=gha,mode=max,scope=backend \
            --load \
            .
      - name: Frontend image build (no push)
        run: |
          docker buildx build \
            --file docker/m8flow.frontend.Dockerfile \
            --tag frontend:pr-test \
            --cache-from type=gha,scope=frontend \
            --cache-to type=gha,mode=max,scope=frontend \
            --load \
            .
      - name: Keycloak image build (no push)
        run: |
          docker buildx build \
            --file docker/m8flow.keycloak.Dockerfile \
            --tag keycloak:pr-test \
            --cache-from type=gha,scope=keycloak \
            --cache-to type=gha,mode=max,scope=keycloak \
            --load \
            .
      - name: Connector-proxy image build (no push)
        run: |
          docker buildx build \
            --file m8flow-connector-proxy/Dockerfile \
            --tag connector-proxy:pr-test \
            --cache-from type=gha,scope=connector-proxy \
            --cache-to type=gha,mode=max,scope=connector-proxy \
            --load \
            m8flow-connector-proxy

  # -------------------------
  # E2E Tests (Playwright)
  # -------------------------
  e2e-tests:
    name: E2E Tests (Playwright)
    needs: path_filters
    # Run on every push and on PRs that touch backend, frontend, or docker/connector
    # code. Docs-only PRs skip the (expensive) full-stack run.
    if: ${{ github.event_name == 'push' || needs.path_filters.outputs.backend == 'true' || needs.path_filters.outputs.frontend == 'true' || needs.path_filters.outputs.docker_m8flow == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45            # generous job ceiling; test step is bounded separately
    env:
      COMPOSE_FILE: docker/m8flow-docker-compose.yml
      TEST_DIR: extensions/m8flow-frontend/test/browser
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Prepare env file
        # Compose services read ../.env (env_file). sample.env carries dev-safe defaults.
        run: cp sample.env .env
      # Build each image once with a per-image GitHub Actions layer cache, loading it
      # under the tag the compose file expects so `compose up` reuses it (pull_policy: never).
      - name: Build backend image (gha cache)
        run: |
          docker buildx build \
            --file docker/m8flow.backend.Dockerfile \
            --tag m8flow-backend \
            --cache-from type=registry,ref=docker.io/m8flow/m8flow-backend:buildcache \
            --cache-from type=gha,scope=backend \
            --cache-to type=gha,mode=max,scope=backend \
            --load \
            .
      - name: Build frontend image (gha cache)
        run: |
          docker buildx build \
            --file docker/m8flow.frontend.Dockerfile \
            --tag m8flow-frontend \
            --cache-from type=gha,scope=frontend \
            --cache-to type=gha,mode=max,scope=frontend \
            --load \
            .
      - name: Build keycloak image (gha cache)
        run: |
          docker buildx build \
            --file docker/m8flow.keycloak.Dockerfile \
            --tag m8flow-keycloak \
            --cache-from type=gha,scope=keycloak \
            --cache-to type=gha,mode=max,scope=keycloak \
            --load \
            .
      - name: Build connector-proxy image (gha cache)
        run: |
          docker buildx build \
            --file m8flow-connector-proxy/Dockerfile \
            --tag m8flow/m8flow-connector-proxy \
            --cache-from type=gha,scope=connector-proxy \
            --cache-to type=gha,mode=max,scope=connector-proxy \
            --load \
            m8flow-connector-proxy
      - name: Start full stack
        # --profile init seeds MinIO buckets, syncs templates/process models, and runs
        # Keycloak realm/user init. Pre-built images mean no rebuild here.
        run: docker compose --profile init -f "$COMPOSE_FILE" up -d
      - name: Wait for stack to be ready
        run: ./.github/scripts/wait-for-e2e-stack.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
      - name: Install uv
        run: pip install uv
      - name: Install E2E suite deps + Chromium
        working-directory: ${{ env.TEST_DIR }}
        run: |
          uv sync
          uv run playwright install --with-deps chromium
      - name: Run Playwright E2E (parallel)
        working-directory: ${{ env.TEST_DIR }}
        timeout-minutes: 20         # AC2: bound test execution to the 10-20 min budget
        env:
          E2E_URL: http://localhost:6841
        run: |
          # Parallelize by file (keeps module-scoped login fixtures on one worker),
          # excluding the stateful live-backend approval flow...
          uv run python -m pytest -n auto --dist loadfile -k "not form_driven" -v --qa-report
          # ...then run that heavy E2E serially so it never races parallel files.
          uv run python -m pytest -k form_driven -v
      - name: Dump compose logs on failure
        if: failure()
        run: |
          mkdir -p "$TEST_DIR/test-results"
          docker compose -f "$COMPOSE_FILE" logs --no-color > "$TEST_DIR/test-results/compose-logs.txt" 2>&1 || true
      - name: Upload E2E report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: ${{ env.TEST_DIR }}/test-results/
          retention-days: 14
          if-no-files-found: warn
      - name: Publish report link to job summary
        if: always()
        run: |
          {
            echo "## Playwright E2E results"
            echo ""
            echo "Detailed HTML report + failure screenshots/traces are in the"
            echo "**playwright-e2e-report** artifact for this run (QA dashboard at"
            echo "\`test-results/qa-report/index.html\`)."
            echo ""
            echo "Download it from the **Artifacts** section of this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Tear down stack
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v || true

  # -------------------------
  # Required Merge Gate
  # -------------------------
  required-ci:
    name: Required CI
    needs:
      - path_filters
      - backend-lint
      - backend
      - frontend-lint
      - frontend-build-unit
      - codeql
      - trivy
      - migration-check
      - docker-dry-run
      - e2e-tests
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'pull_request') }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate required CI results
        shell: bash
        run: |
          set -euo pipefail

          echo "backend result: ${{ needs.backend.result }}"
          echo "backend-lint result: ${{ needs.backend-lint.result }}"
          echo "frontend-lint result: ${{ needs.frontend-lint.result }}"
          echo "frontend-build-unit result: ${{ needs.frontend-build-unit.result }}"
          echo "codeql result: ${{ needs.codeql.result }}"
          echo "trivy result: ${{ needs.trivy.result }}"
          echo "migration-check result: ${{ needs.migration-check.result }}"
          echo "docker-dry-run result: ${{ needs.docker-dry-run.result }}"
          echo "e2e-tests result: ${{ needs.e2e-tests.result }}"

          if [[ "${{ github.event_name }}" == "push" || "${{ needs.path_filters.outputs.backend }}" == "true" ]]; then
            [[ "${{ needs.backend-lint.result }}" == "success" ]] || {
              echo "::error::Backend lint CI did not succeed."
              exit 1
            }
            [[ "${{ needs.backend.result }}" == "success" ]] || {
              echo "::error::Backend CI did not succeed."
              exit 1
            }
          fi

          if [[ "${{ github.event_name }}" == "push" || "${{ needs.path_filters.outputs.frontend }}" == "true" ]]; then
            [[ "${{ needs.frontend-lint.result }}" == "success" ]] || {
              echo "::error::Frontend lint CI did not succeed."
              exit 1
            }
            [[ "${{ needs.frontend-build-unit.result }}" == "success" ]] || {
              echo "::error::Frontend build/unit CI did not succeed."
              exit 1
            }
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            [[ "${{ needs.codeql.result }}" == "success" ]] || {
              echo "::error::CodeQL scan did not succeed."
              exit 1
            }
            [[ "${{ needs.trivy.result }}" == "success" ]] || {
              echo "::error::Trivy security scan did not succeed."
              exit 1
            }
          fi

          [[ "${{ needs.migration-check.result }}" == "success" ]] || {
            echo "::error::Migration compatibility check did not succeed."
            exit 1
          }

          if [[ "${{ github.event_name }}" == "pull_request" && ( "${{ needs.path_filters.outputs.backend }}" == "true" || "${{ needs.path_filters.outputs.frontend }}" == "true" || "${{ needs.path_filters.outputs.docker_m8flow }}" == "true" ) ]]; then
            [[ "${{ needs.docker-dry-run.result }}" == "success" ]] || {
              echo "::error::Docker build dry run did not succeed."
              exit 1
            }
          fi

          # E2E runs on every push and on PRs touching backend/frontend/docker; it must
          # pass whenever it was expected to run (matches the e2e-tests job's own `if`).
          if [[ "${{ github.event_name }}" == "push" || ( "${{ github.event_name }}" == "pull_request" && ( "${{ needs.path_filters.outputs.backend }}" == "true" || "${{ needs.path_filters.outputs.frontend }}" == "true" || "${{ needs.path_filters.outputs.docker_m8flow }}" == "true" ) ) ]]; then
            [[ "${{ needs.e2e-tests.result }}" == "success" ]] || {
              echo "::error::E2E (Playwright) tests did not succeed."
              exit 1
            }
          fi
