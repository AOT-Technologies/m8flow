services:
  minio-local-dev:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    env_file: ../.env
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_LOCAL_DEV_API_PORT:-16846}:9000"
      - "${MINIO_LOCAL_DEV_CONSOLE_PORT:-16847}:9001"
    volumes:
      - ${M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR:-./data/bpmn}:/data
      - ${M8FLOW_TEMPLATES_STORAGE_DIR:-./data/templates}:/m8flow-templates