# Keycloak proxy: listen on 6842 inside the container, forward to keycloak:8080.
# Host port is KEYCLOAK_PROXY_PORT (default 6842); map host:6842 in compose.
# Backend uses http://keycloak-proxy:6842 from inside Docker.
server {
    listen 6842;
    server_name _;

    location = / {
        return 302 $scheme://$host:$server_port/admin/;
    }

    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }
}
